<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Rain</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:transparent}
canvas{display:block;width:100%;height:100%}
.gear{position:fixed;top:8px;left:8px;width:28px;height:28px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transform:scale(0.8);transition:opacity 0.2s,transform 0.2s,background 0.2s;pointer-events:none}
body:hover .gear,.gear.pin{opacity:0.65;transform:scale(1);pointer-events:auto}
.gear:hover{opacity:1!important;background:rgba(0,0,0,0.8)!important}
.gear svg{width:14px;height:14px;fill:#bbb}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}.ov.open{opacity:1;pointer-events:auto}
.pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.93);width:300px;max-height:86vh;overflow-y:auto;border-radius:14px;z-index:210;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;font-family:'Inter',sans-serif;background:#181818;color:#ddd;border:1px solid #2a2a2a;box-shadow:0 16px 60px rgba(0,0,0,.85)}
.pop.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.pop::-webkit-scrollbar{width:4px}.pop::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.ph span{font-size:14px;font-weight:700;color:#e8e8e8}
.px{width:26px;height:26px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px;color:#555;transition:background .15s,color .15s}
.px:hover{background:rgba(255,255,255,.07);color:#999}
.lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#555;margin:14px 0 8px}.lb:first-of-type{margin-top:0}
.sp{height:1px;background:#222;margin:14px 0}
.tg{display:flex;border-radius:8px;overflow:hidden;border:1px solid #272727}
.tb{flex:1;padding:7px 3px;font-size:10.5px;font-weight:600;text-align:center;background:#1e1e1e;color:#444;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;border-left:1px solid #272727}
.tb:first-child{border-left:none}
.tb.on{background:#e8e8e8;color:#111}
.tb:hover:not(.on){background:#252525;color:#888}
.sr{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.sw{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .12s,border-color .12s;flex-shrink:0}
.sw:hover{transform:scale(1.13)}
.sw.on{border-color:rgba(255,255,255,.85)}
.hi{display:flex;gap:8px;align-items:center}
.hip{width:30px;height:30px;border-radius:6px;border:1px solid #333;flex-shrink:0;transition:background .15s}
.hi input{flex:1;height:30px;background:#222;border:1px solid #333;border-radius:6px;color:#ccc;padding:0 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;letter-spacing:.05em}
.hi input:focus{border-color:#555}
.zr{display:flex;align-items:center;gap:8px}
.zi{font-size:10px;color:#444;font-weight:700;min-width:30px}
.zi.r{text-align:right}
.zs{flex:1;appearance:none;-webkit-appearance:none;height:4px;border-radius:4px;background:#2a2a2a;outline:none;cursor:pointer}
.zs::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#ccc;border:2px solid #181818;cursor:pointer}
.zl{font-size:11px;font-weight:600;color:#444;min-width:24px;text-align:center}
.rst{display:block;margin-top:16px;font-size:11px;text-align:center;cursor:pointer;color:#333;transition:color .15s;padding:3px}
.rst:hover{color:#888}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button class="gear" id="gearBtn" title="Settings">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.49.49 0 00.12.61l2.03 1.58c-.04.31-.06.63-.06.94 0 .31.02.63.06.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
</button>
<div class="ov" id="ov"></div>
<div class="pop" id="pop">
  <div class="ph"><span>Settings</span><button class="px" id="popX">✕</button></div>

  <div class="lb">Theme</div>
  <div class="tg" id="gTheme">
    <button class="tb" data-v="dark">Dark</button>
    <button class="tb" data-v="light">Light</button>
  </div>
  <div class="sp"></div>

  <div class="lb">Characters</div>
  <div class="tg" id="gCharset">
    <button class="tb" data-v="katakana">カナ</button>
    <button class="tb" data-v="latin">ABC</button>
    <button class="tb" data-v="binary">01</button>
    <button class="tb" data-v="numbers">123</button>
    <button class="tb" data-v="symbols">!@#</button>
    <button class="tb" data-v="mixed">Mix</button>
  </div>
  <div class="sp"></div>

  <div class="lb">Colour</div>
  <div class="sr" id="gColor">
    <div class="sw" data-c="#00ff41" style="background:#00ff41"></div>
    <div class="sw" data-c="#ffffff" style="background:#fff"></div>
    <div class="sw" data-c="#00cfff" style="background:#00cfff"></div>
    <div class="sw" data-c="#ff3322" style="background:#ff3322"></div>
    <div class="sw" data-c="#cc44ff" style="background:#cc44ff"></div>
    <div class="sw" data-c="#ffaa00" style="background:#ffaa00"></div>
    <div class="sw" data-c="#ff44aa" style="background:#ff44aa"></div>
    <div class="sw" data-c="#00ffee" style="background:#00ffee"></div>
    <div class="sw" data-c="#d4a017" style="background:#d4a017"></div>
  </div>
  <div class="hi">
    <div class="hip" id="hexPrev"></div>
    <input type="text" id="hexIn" maxlength="7" placeholder="#RRGGBB" spellcheck="false">
  </div>
  <div class="sp"></div>

  <div class="lb">Speed</div>
  <div class="zr"><span class="zi">Slow</span><input type="range" class="zs" id="speedSl" min="1" max="3" step="0.5"><span class="zi r">Fast</span><span class="zl" id="speedLb"></span></div>
  <div class="sp"></div>

  <div class="lb">Font Size</div>
  <div class="zr"><span class="zi">−</span><input type="range" class="zs" id="sizeSl" min="8" max="20" step="2"><span class="zi r">+</span><span class="zl" id="sizeLb"></span></div>
  <div class="sp"></div>

  <div class="lb">Trail Length</div>
  <div class="zr"><span class="zi">Short</span><input type="range" class="zs" id="trailSl" min="1" max="9" step="1"><span class="zi r">Long</span><span class="zl" id="trailLb"></span></div>

  <div class="rst" id="rstBtn">Reset to defaults</div>
</div>

<script>
const CHARSETS={
  katakana:'ァアィイゥウェエォオカガキギクグケゲコゴサザシジスズセゼソゾタダチヂッツヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモャヤュユョヨラリルレロワヲン',
  latin:'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
  binary:'01',
  numbers:'0123456789',
  symbols:'!@#$%^&*<>?|/\\[]{}~=+',
  mixed:'アカサタ0123ABCdef!@#XYZ'
};

const P=new URLSearchParams(location.search);
function parseColor(s){
  if(!s)return null;
  const m=s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if(m)return'#'+[+m[1],+m[2],+m[3]].map(x=>x.toString(16).padStart(2,'0')).join('');
  if(/^#?[0-9a-f]{6}$/i.test(s))return s[0]==='#'?s:'#'+s;
  return null;
}

const DEF={theme:'dark',charset:'latin',color:'#ffffff',speed:2,size:14,trail:5};
const CGAP=8; // extra horizontal gap between columns (reduces stream count)
const GAP=4;  // vertical gap between rows
let S={...DEF};
function load(){try{const d=localStorage.getItem('wmx2');if(d)S={...DEF,...JSON.parse(d)};}catch(e){}}
function save(){try{localStorage.setItem('wmx2',JSON.stringify(S));}catch(e){}}
function applyUrl(){
  if(P.get('charset')&&CHARSETS[P.get('charset')])S.charset=P.get('charset');
  if(P.get('theme')==='dark'||P.get('theme')==='light')S.theme=P.get('theme');
  const c=parseColor(P.get('color'));if(c)S.color=c;
  if(P.get('speed'))S.speed=Math.max(1,Math.min(3,+P.get('speed')));
  if(P.get('size'))S.size=Math.max(8,Math.min(20,+P.get('size')));
  if(P.get('trail'))S.trail=Math.max(1,Math.min(9,+P.get('trail')));
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// Per-cell state
let charGrid=[];   // char value
let alphaGrid=[];  // current rendered alpha (0-1)
let visitedGrid=[];// true once a stream has passed through this cell
let phase=[];      // stream head position per column (float, wraps)
let colSpeed=[];   // rows per tick, unique per column
let colSLen=[];    // stream length per column

let cols=0,rows=0,charW=1,colStride=1,rowStride=1;

// AMBIENT floor — chars never drop below this
const BASE=0.32;
// Peak brightness at stream tip
const PEAK=0.92;

function rc(){const s=CHARSETS[S.charset]||CHARSETS.latin;return s[Math.random()*s.length|0];}
function hexRgb(h){const m=(h||'').match(/^#?([0-9a-f]{6})/i);if(!m)return{r:255,g:255,b:255};const n=parseInt(m[1],16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255};}

function measureCharW(){ctx.font='bold '+S.size+'px monospace';return Math.ceil(ctx.measureText('W').width);}

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;initGrid();}

function streamLen(){
  // Short by default so gradient isn't visually obvious; trail slider extends it
  return 3+Math.round(S.trail*1.4);
}

function initGrid(){
  charW=measureCharW();
  colStride=charW+CGAP;rowStride=S.size+GAP;
  cols=Math.max(1,Math.floor(canvas.width/colStride));
  rows=Math.max(1,Math.floor(canvas.height/rowStride)+2);

  charGrid=Array.from({length:cols},()=>Array.from({length:rows},rc));

  alphaGrid=Array.from({length:cols},()=>Array(rows).fill(0));
  visitedGrid=Array.from({length:cols},()=>Array(rows).fill(false));

  // Evenly stagger stream heads across full height — prevents any grouping
  phase=Array.from({length:cols},(_,i)=>(i/cols)*rows);

  // Each column advances at a different rate — cols never re-sync
  colSpeed=Array.from({length:cols},()=>0.9+Math.random()*0.4);

  const sl=streamLen();
  colSLen=Array.from({length:cols},()=>sl+Math.floor(Math.random()*3)-1);
}

function tick(){
  // How many rows each column advances per tick, scaled by speed
  const advPerTick=(S.speed/2)*0.55;

  // Chars only flicker while the stream is actively passing through
  const inStreamRate=0.45;

  for(let col=0;col<cols;col++){
    phase[col]=(phase[col]+colSpeed[col]*advPerTick)%rows;
    const head=phase[col];
    const sl=colSLen[col];

    for(let row=0;row<rows;row++){
      const dist=(head-row+rows)%rows;
      const inStream=dist<sl;
      if(inStream) visitedGrid[col][row]=true;

      // --- TARGET ALPHA ---
      let target;
      if(dist<1){
        // Tip: spike to peak
        target=PEAK;
      } else if(inStream){
        // Stream body: steep power-curve falloff — NOT linear, drops off fast
        // Power 3 makes it fall quickly then level out near BASE
        const t=1-(dist-1)/(sl-1);
        target=BASE+(PEAK-BASE)*Math.pow(t,3);
      } else {
        target=visitedGrid[col][row]?BASE:0;
      }

      // Add small per-char random noise so no two chars have the same alpha
      // This breaks up any residual smooth-gradient appearance
      target+=( Math.random()-0.5 )*0.06;
      target=Math.max(visitedGrid[col][row]?BASE-0.04:0,Math.min(PEAK,target));

      // Move current alpha TOWARD target (not snap) for natural look
      // Fast approach when illuminating, slower when fading — mimics phosphor decay
      const cur=alphaGrid[col][row];
      if(target>cur){
        alphaGrid[col][row]=cur+(target-cur)*0.65; // fast brighten
      } else {
        alphaGrid[col][row]=cur+(target-cur)*0.18; // slow fade
      }

      // Char changes: only while stream is passing through this cell
      if(dist<1&&Math.random()<inStreamRate){
        charGrid[col][row]=rc();
      }
    }
  }
}

function applyTheme(){document.body.style.background=S.theme==='light'?'#ffffff':'#191919';}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const rgb=hexRgb(S.color);
  ctx.font='bold '+S.size+'px monospace';
  ctx.textBaseline='top';

  for(let col=0;col<cols;col++){
    for(let row=0;row<rows;row++){
      const a=alphaGrid[col][row];
      if(a<0.04)continue;
      ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${a.toFixed(3)})`;
      ctx.fillText(charGrid[col][row],col*colStride,row*rowStride);
    }
  }
}

// Tick at ~20fps (interval driven) — stepped, not silky smooth
// This makes stream positions feel discrete rather than continuously flowing,
// which breaks the "smooth gradient beam" appearance
let raf,lastTime=0;
function loop(ts){
  raf=requestAnimationFrame(loop);
  const interval=Math.max(16,55-S.speed*4); // speed1→51ms≈20fps, speed10→15ms≈66fps
  if(ts-lastTime<interval)return;
  lastTime=ts;
  tick();
  draw();
}

function restart(){if(raf)cancelAnimationFrame(raf);initGrid();lastTime=0;raf=requestAnimationFrame(loop);}

window.addEventListener('resize',resize);

// ── POPUP ────────────────────────────────────────────
const gearBtn=document.getElementById('gearBtn'),pop=document.getElementById('pop'),ov=document.getElementById('ov');
function openPop(){pop.classList.add('open');ov.classList.add('open');gearBtn.classList.add('pin');}
function closePop(){pop.classList.remove('open');ov.classList.remove('open');gearBtn.classList.remove('pin');}
gearBtn.addEventListener('click',()=>pop.classList.contains('open')?closePop():openPop());
ov.addEventListener('click',closePop);
document.getElementById('popX').addEventListener('click',closePop);

document.getElementById('gTheme').addEventListener('click',e=>{
  const b=e.target.closest('.tb');if(!b)return;
  S.theme=b.dataset.v;save();syncTg('gTheme',S.theme);applyTheme();
});
document.getElementById('gCharset').addEventListener('click',e=>{
  const b=e.target.closest('.tb');if(!b)return;
  S.charset=b.dataset.v;save();syncTg('gCharset',S.charset);
  for(let c=0;c<cols;c++)for(let r=0;r<rows;r++)charGrid[c][r]=rc();
});
document.getElementById('gColor').addEventListener('click',e=>{
  const sw=e.target.closest('.sw');if(!sw)return;
  S.color=sw.dataset.c;save();hlColor();
});

const hexIn=document.getElementById('hexIn'),hexPrev=document.getElementById('hexPrev');
hexIn.addEventListener('input',()=>{
  let v=hexIn.value.trim();if(v&&v[0]!=='#')v='#'+v;
  if(/^#[0-9a-f]{6}$/i.test(v)){S.color=v.toLowerCase();save();hlColor(true);}
});
hexIn.addEventListener('blur',()=>{hexIn.value=S.color.toUpperCase();});

function hlColor(skipInput){
  const col=S.color.toLowerCase();
  document.querySelectorAll('#gColor .sw').forEach(s=>s.classList.toggle('on',s.dataset.c.toLowerCase()===col));
  hexPrev.style.background=S.color;
  if(!skipInput)hexIn.value=S.color.toUpperCase();
}

function mkSlider(id,lbId,key,cb){
  const el=document.getElementById(id),lb=document.getElementById(lbId);
  el.addEventListener('input',()=>{S[key]=parseInt(el.value);lb.textContent=el.value;save();if(cb)cb();});
}
mkSlider('speedSl','speedLb','speed');
mkSlider('sizeSl','sizeLb','size',()=>{charW=measureCharW();initGrid();});
mkSlider('trailSl','trailLb','trail',()=>{
  const sl=streamLen();
  for(let c=0;c<cols;c++)colSLen[c]=sl+Math.floor(Math.random()*3)-1;
});

function syncTg(id,val){document.querySelectorAll('#'+id+' .tb').forEach(b=>b.classList.toggle('on',b.dataset.v===val));}
function syncAll(){
  syncTg('gTheme',S.theme);syncTg('gCharset',S.charset);hlColor();
  [['speed','speedSl','speedLb'],['size','sizeSl','sizeLb'],['trail','trailSl','trailLb']].forEach(([k,si,li])=>{
    document.getElementById(si).value=S[k];document.getElementById(li).textContent=S[k];
  });
}

document.getElementById('rstBtn').addEventListener('click',()=>{S={...DEF};save();syncAll();restart();});

load();applyUrl();syncAll();applyTheme();resize();restart();
</script>
</body>
</html>
